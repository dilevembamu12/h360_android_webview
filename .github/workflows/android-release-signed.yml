name: Android Signed Release (AAB + APK)

on:
  workflow_dispatch:

jobs:
  build-signed-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          missing=0
          for key in ANDROID_KEYSTORE_BASE64 ANDROID_SIGNING_STORE_PASSWORD ANDROID_SIGNING_KEY_ALIAS ANDROID_SIGNING_KEY_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > /tmp/h360-release.keystore
          ls -lh /tmp/h360-release.keystore

      - name: Build signed release bundle (AAB) + APK
        env:
          ANDROID_SIGNING_KEYSTORE_PATH: /tmp/h360-release.keystore
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          ./gradlew --no-daemon --stacktrace clean :app:bundleRelease :app:assembleRelease

      - name: Upload signed release AAB
        uses: actions/upload-artifact@v4
        with:
          name: h360pos-webview-release-aab-signed
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: h360pos-webview-release-apk-signed
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
